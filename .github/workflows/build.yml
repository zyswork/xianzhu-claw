name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Universal (M + Intel)
          - platform: macos-latest
            target: universal-apple-darwin
            label: macOS-Universal
          # Windows
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64
          # Linux
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # macOS Universal 需要两个 target
      - name: Add aarch64 target (macOS)
        if: matrix.target == 'universal-apple-darwin'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      # Linux 依赖
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      # 构建前端
      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npx vite build

      # 构建 Tauri
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: local-app
          tauriScript: cargo tauri
          args: --target ${{ matrix.target }}

      # 上传产物
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: YonClaw-${{ matrix.label }}
          path: |
            local-app/target/${{ matrix.target }}/release/bundle/**/*.dmg
            local-app/target/${{ matrix.target }}/release/bundle/**/*.app
            local-app/target/${{ matrix.target }}/release/bundle/**/*.msi
            local-app/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            local-app/target/${{ matrix.target }}/release/bundle/**/*.deb

  # 创建 Release（仅 tag 触发时）
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.AppImage
            artifacts/**/*.deb
